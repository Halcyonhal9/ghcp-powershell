name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_e2e:
        description: Run end-to-end tests (requires COPILOT_E2E_TOKEN secret)
        type: boolean
        default: false

jobs:
  build-and-unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Unit tests never launch the Copilot CLI, so skip the SDK's automatic
      # CLI download (~130 MB) to keep CI fast.
      - name: Build
        run: dotnet build tests/CopilotCmdlets.Tests.csproj -c Release -p:CopilotSkipCliDownload=true

      - name: Unit tests
        run: dotnet test tests/CopilotCmdlets.Tests.csproj -c Release --no-build --filter "Category=Unit"

  e2e-test:
    if: github.event_name == 'workflow_dispatch' && inputs.run_e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Check token
        run: |
          if [ -z "${{ secrets.COPILOT_E2E_TOKEN }}" ]; then
            echo "::error::COPILOT_E2E_TOKEN secret is not configured (needs a Copilot-enabled GitHub token)"
            exit 1
          fi

      - name: Publish module
        run: dotnet publish src/CopilotCmdlets.csproj -c Release -o out

      - name: End-to-end tests
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_E2E_TOKEN }}
        run: dotnet test tests/CopilotCmdlets.Tests.csproj --filter "Category=EndToEnd"
